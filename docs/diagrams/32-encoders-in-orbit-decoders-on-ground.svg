    <line x1="186" y1="94" x2="226" y2="94" stroke="#3a4280" stroke-width="0.5"/>
    <rect x="-6" y="0" width="192" height="170" rx="8" fill="url(#busFace)" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="90" y="28" text-anchor="middle" font-size="13" fill="#94a3b8">vortx-04</text>
    <rect x="12" y="44" width="156" height="36" rx="4" fill="#0c1228" stroke="#475569"/>
    <text x="90" y="68" text-anchor="middle" font-size="13" fill="#cfd9ff">camera</text>
    <rect x="12" y="92" width="156" height="60" rx="4" fill="url(#encFace)" stroke="#7c3aed" stroke-width="1.4"/>
    <text x="90" y="126" text-anchor="middle" font-size="15" fill="#a78bfa" font-weight="700">encoder</text>
  </g>

  <!-- SAT N -->
  <g transform="translate(1540,232)">
    <rect x="-46" y="46" width="40" height="78" fill="#1a2050" stroke="#3a4280"/>
    <rect x="186" y="46" width="40" height="78" fill="#1a2050" stroke="#3a4280"/>
    <line x1="-46" y1="58" x2="-6" y2="58" stroke="#3a4280" stroke-width="0.5"/>
    <line x1="-46" y1="76" x2="-6" y2="76" stroke="#3a4280" stroke-width="0.5"/>
    <line x1="-46" y1="94" x2="-6" y2="94" stroke="#3a4280" stroke-width="0.5"/>
    <line x1="186" y1="58" x2="226" y2="58" stroke="#3a4280" stroke-width="0.5"/>
    <line x1="186" y1="76" x2="226" y2="76" stroke="#3a4280" stroke-width="0.5"/>
    <line x1="186" y1="94" x2="226" y2="94" stroke="#3a4280" stroke-width="0.5"/>
    <rect x="-6" y="0" width="192" height="170" rx="8" fill="url(#busFace)" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="90" y="28" text-anchor="middle" font-size="13" fill="#94a3b8">vortx-N</text>
    <rect x="12" y="44" width="156" height="36" rx="4" fill="#0c1228" stroke="#475569"/>
    <text x="90" y="68" text-anchor="middle" font-size="13" fill="#cfd9ff">camera</text>
    <rect x="12" y="92" width="156" height="60" rx="4" fill="url(#encFace)" stroke="#7c3aed" stroke-width="1.4"/>
    <text x="90" y="126" text-anchor="middle" font-size="15" fill="#a78bfa" font-weight="700">encoder</text>
  </g>

  <!-- ============================================================ ATMOSPHERE -->
  <!-- a single muted line marks the boundary the latents cross -->
  <g>
    <line x1="80" y1="498" x2="1840" y2="498" stroke="#1f2752" stroke-width="1" stroke-dasharray="2 6"/>
    <text x="80" y="492" font-size="11" fill="#475569" letter-spacing="2">atmosphere</text>
  </g>

  <!-- ============================================================ DOWNLINK -->
  <!-- five converging beams: from each sat encoder bottom edge to one ground-station -->
  <g stroke="#f59e0b" stroke-width="2" fill="none" opacity="0.95" marker-end="url(#downlink)">
    <path d="M 190,402 Q 480,520 960,620"/>
    <path d="M 550,380 Q 700,520 960,620"/>
    <path d="M 910,366 L 960,620"/>
    <path d="M 1270,382 Q 1180,520 960,620"/>
    <path d="M 1630,402 Q 1400,520 960,620"/>
  </g>
  <g font-size="11" fill="#fbbf24" opacity="0.9">
    <text x="280" y="478">latent ~1 KB</text>
    <text x="560" y="478">latent ~1 KB</text>
    <text x="910" y="478" text-anchor="middle">latent ~1 KB</text>
    <text x="1280" y="478">latent ~1 KB</text>
    <text x="1620" y="478">latent ~1 KB</text>
  </g>

  <!-- ground station mast -->
  <g transform="translate(944,604)">
    <path d="M 0,28 L 16,0 L 32,28 Z" fill="#e8eef5" stroke="#3b82f6" stroke-width="1.4"/>
    <line x1="16" y1="28" x2="16" y2="46" stroke="#3b82f6" stroke-width="2"/>
    <rect x="10" y="46" width="12" height="8" fill="#94a3b8"/>
  </g>
  <text x="960" y="688" text-anchor="middle" font-size="12" fill="#94a3b8">ground station</text>

  <!-- =========================================================== GROUND -->
  <g font-size="13" fill="#64748b" letter-spacing="2">
    <text x="80" y="708">GROUND · decoder layer</text>
  </g>

  <!-- Latent lake (object store) -->
  <g transform="translate(80,728)">
    <rect x="0" y="0" width="1760" height="76" rx="10" fill="#0c1530" stroke="#3b82f6" stroke-width="1.4"/>
    <text x="22" y="32" font-size="18" fill="#e8eef5" font-weight="700">latent lake</text>
    <text x="22" y="56" font-size="13" fill="#94a3b8">parquet shards on S3 · GCS · Azure  ·  keys: (cell64, tslot, model_id, sensor_id)  ·  every latent is durable, replayable, deterministic</text>
  </g>

  <!-- decode arrows: lake → decoders -->
  <g stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#latent)">
    <path d="M 300,804 L 300,840"/>
    <path d="M 720,804 L 720,840"/>
    <path d="M 1140,804 L 1140,840"/>
  </g>

  <!-- Three decoder heads in a row -->
  <g transform="translate(80,840)">
    <!-- Linear probes -->
    <rect x="0" y="0" width="440" height="120" rx="10" fill="url(#decFace)" stroke="#7c3aed" stroke-width="1.4"/>
    <text x="20" y="32" font-size="17" fill="#a78bfa" font-weight="700">linear probes</text>
    <text x="20" y="58" font-size="13" fill="#cfd9ff">latent · β  →  scalar</text>
    <text x="20" y="80" font-size="12" fill="#94a3b8">NDVI · LST · canola yield (t/ha)</text>
    <text x="20" y="98" font-size="12" fill="#94a3b8">soil organic carbon · above-ground biomass</text>

    <!-- Diffusion / reconstruction -->
    <rect x="460" y="0" width="440" height="120" rx="10" fill="url(#decFace)" stroke="#7c3aed" stroke-width="1.4"/>
    <text x="480" y="32" font-size="17" fill="#a78bfa" font-weight="700">reconstruction head</text>
    <text x="480" y="58" font-size="13" fill="#cfd9ff">latent  →  scene · mask · vector</text>
    <text x="480" y="80" font-size="12" fill="#94a3b8">water extent · built-up footprint</text>
    <text x="480" y="98" font-size="12" fill="#94a3b8">synthetic RGB for human eyes</text>

    <!-- Archetype matcher -->
    <rect x="920" y="0" width="440" height="120" rx="10" fill="url(#decFace)" stroke="#7c3aed" stroke-width="1.4"/>
    <text x="940" y="32" font-size="17" fill="#a78bfa" font-weight="700">archetype matcher</text>
    <text x="940" y="58" font-size="13" fill="#cfd9ff">cosine(latent, centroid)  →  label</text>
    <text x="940" y="80" font-size="12" fill="#94a3b8">land-cover class · ecological analog</text>
    <text x="940" y="98" font-size="12" fill="#94a3b8">no training, no weights, just memory</text>

    <!-- right-side annotation: the "encoder = sidecar" callout -->
    <g transform="translate(1400,0)">
      <rect x="0" y="0" width="360" height="120" rx="10" fill="#080d18" stroke="#475569"/>
      <text x="18" y="30" font-size="14" fill="#94a3b8" letter-spacing="2">SIDECAR</text>
      <text x="18" y="56" font-size="15" fill="#e8eef5" font-weight="700">runs the same encoder</text>
      <text x="18" y="78" font-size="13" fill="#cfd9ff">for partner sensors that don&apos;t</text>
      <text x="18" y="96" font-size="13" fill="#cfd9ff">carry the encoder on the bus.</text>
      <text x="18" y="114" font-size="11" fill="#64748b">python/jepa_v2_sidecar · UDS · CBOR</text>
    </g>
  </g>

  <!-- arrow: three decoders → cache -->
  <g stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#fact)">
    <path d="M 300,964 L 300,1000"/>
    <path d="M 720,964 L 720,1000"/>
    <path d="M 1140,964 L 1140,1000"/>
  </g>

  <!-- Cache band -->
  <g transform="translate(80,1000)">
    <rect x="0" y="0" width="1340" height="62" rx="10" fill="#062017" stroke="#22c55e" stroke-width="1.6"/>
    <text x="22" y="30" font-size="17" fill="#22c55e" font-weight="700">signed-fact cache</text>
    <text x="22" y="52" font-size="13" fill="#cfd9ff">(cell, band, tslot) → fact_cid · canonical CBOR · BLAKE3 · ed25519 · sled · the surface AI agents read</text>
  </g>

  <!-- Agents column on the right -->
  <g transform="translate(1440,1000)">
    <rect x="0" y="0" width="320" height="62" rx="10" fill="#0c1530" stroke="#3b82f6" stroke-width="1.4"/>
    <text x="20" y="30" font-size="14" fill="#e8eef5" font-weight="700">agents</text>
    <text x="20" y="52" font-size="12" fill="#94a3b8">Claude · ChatGPT · Cursor · custom MCP · curl</text>
  </g>
  <g stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#fact)">
    <path d="M 1420,1031 L 1440,1031"/>
  </g>
</svg>

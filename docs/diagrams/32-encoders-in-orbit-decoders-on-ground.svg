<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace" role="img" aria-label="Encoders fly on the spacecraft; only the latent comes down. The ground side runs decoders that turn the latent into signed facts in the cache, which is what AI agents actually read.">
  <title>encoders in orbit · decoders on ground</title>
  <desc>Each Vortx satellite carries the camera and the foundation encoder on the bus. What flies down is a latent — a few kilobytes — not the raw scene. On the ground, the latent lands in shared storage and is consumed by the decoder layer: linear probes, diffusion heads, and archetype matchers turn it into per-band scalars or reconstructed scenes. Each output is canonical CBOR, BLAKE3-addressed, ed25519-signed, persisted in sled. AI agents read from that cache; the cache is the surface they actually see.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#02050f"/>
      <stop offset="0.40" stop-color="#04081c"/>
      <stop offset="0.55" stop-color="#070d24"/>
      <stop offset="1" stop-color="#02050f"/>
    </linearGradient>
    <radialGradient id="earth" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#163763"/>
      <stop offset="0.55" stop-color="#0a1c38"/>
      <stop offset="1" stop-color="#02060f"/>
    </radialGradient>
    <linearGradient id="busFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2244"/>
      <stop offset="1" stop-color="#0c1228"/>
    </linearGradient>
    <linearGradient id="encFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241039"/>
      <stop offset="1" stop-color="#10061f"/>
    </linearGradient>
    <linearGradient id="decFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1f28"/>
      <stop offset="1" stop-color="#061218"/>
    </linearGradient>
    <pattern id="stars" x="0" y="0" width="600" height="220" patternUnits="userSpaceOnUse">
      <circle cx="38" cy="34" r="0.7" fill="#cfd9ff" opacity="0.55"/>
      <circle cx="118" cy="88" r="0.5" fill="#cfd9ff" opacity="0.35"/>
      <circle cx="226" cy="22" r="0.6" fill="#cfd9ff" opacity="0.55"/>
      <circle cx="312" cy="156" r="0.4" fill="#cfd9ff" opacity="0.30"/>
      <circle cx="430" cy="62" r="0.7" fill="#cfd9ff" opacity="0.65"/>
      <circle cx="520" cy="174" r="0.5" fill="#cfd9ff" opacity="0.45"/>
      <circle cx="586" cy="112" r="0.6" fill="#cfd9ff" opacity="0.55"/>
      <circle cx="74" cy="170" r="0.4" fill="#cfd9ff" opacity="0.35"/>
      <circle cx="380" cy="42" r="0.5" fill="#cfd9ff" opacity="0.45"/>
      <circle cx="160" cy="200" r="0.7" fill="#cfd9ff" opacity="0.6"/>
      <circle cx="500" cy="30" r="0.4" fill="#cfd9ff" opacity="0.30"/>
    </pattern>
    <marker id="downlink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
    <marker id="latent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
    <marker id="fact" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- background sky -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="360" fill="url(#stars)" opacity="0.85"/>

  <!-- earth horizon (suggested curve at the atmosphere boundary) -->
  <path d="M -200,640 Q 960,540 2120,640 L 2120,720 L -200,720 Z" fill="url(#earth)" opacity="0.85"/>
  <path d="M -200,640 Q 960,540 2120,640" stroke="#3b82f6" stroke-width="1" fill="none" opacity="0.35"/>

  <!-- =========================================================== HEADER  -->
  <g fill="#e8eef5">
    <text x="80" y="98" font-size="44" font-weight="700" letter-spacing="-0.5">encoders in orbit · decoders on ground</text>
    <text x="80" y="134" font-size="16" fill="#94a3b8">what flies down is the latent. the cache is what agents read.</text>
  </g>
  <line x1="80" y1="160" x2="1840" y2="160" stroke="#1f2752" stroke-width="1"/>

  <!-- =========================================================== ORBIT TIER -->
  <g font-size="13" fill="#64748b" letter-spacing="2">
    <text x="80" y="200">ORBIT</text>
  </g>

  <!-- Five satellites along the top, slightly arced so the eye follows the horizon -->

  <!-- Satellite tile macro: 220×220 -->
  <!-- positions: x = 100, 460, 820, 1180, 1540 ; y = 230 with small vertical jitter -->

  <!-- SAT 01 -->
  <g transform="translate(100,232)">
    <!-- solar wings -->
    <rect x="-46" y="46" width="40" height="78" fill="#1a2050" stroke="#3a4280"/>
    <line x1="-46" y1="58" x2="-6" y2="58" stroke="#3a4280" stroke-width="0.5"/>
    <line x1="-46" y1="76" x2="-6" y2="76" stroke="#3a4280" stroke-width="0.5"/>
    <line x1="-46" y1="94" x2="-6" y2="94" stroke="#3a4280" stroke-width="0.5"/>
    <line x1="-46" y1="112" x2="-6" y2="112" stroke="#3a4280" stroke-width="0.5"/>
    <rect x="186" y="46" width="40" height="78" fill="#1a2050" stroke="#3a4280"/>
    <line x1="186" y1="58" x2="226" y2="58" stroke="#3a4280" stroke-width="0.5"/>
    <line x1="186" y1="76" x2="226" y2="76" stroke="#3a4280" stroke-width="0.5"/>
    <line x1="186" y1="94" x2="226" y2="94" stroke="#3a4280" stroke-width="0.5"/>
    <line x1="186" y1="112" x2="226" y2="112" stroke="#3a4280" stroke-width="0.5"/>
    <!-- bus body -->
    <rect x="-6" y="0" width="192" height="170" rx="8" fill="url(#busFace)" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="90" y="28" text-anchor="middle" font-size="13" fill="#94a3b8">vortx-01</text>
    <!-- camera -->
    <rect x="12" y="44" width="156" height="36" rx="4" fill="#0c1228" stroke="#475569"/>
    <text x="90" y="68" text-anchor="middle" font-size="13" fill="#cfd9ff">camera</text>
    <!-- on-board encoder -->
    <rect x="12" y="92" width="156" height="60" rx="4" fill="url(#encFace)" stroke="#7c3aed" stroke-width="1.4"/>
    <text x="90" y="126" text-anchor="middle" font-size="15" fill="#a78bfa" font-weight="700">encoder</text>
  </g>

  <!-- SAT 02 -->
  <g transform="translate(460,210)">
    <rect x="-46" y="46" width="40" height="78" fill="#1a2050" stroke="#3a4280"/>
    <rect x="186" y="46" width="40" height="78" fill="#1a2050" stroke="#3a4280"/>
    <line x1="-46" y1="58" x2="-6" y2="58" stroke="#3a4280" stroke-width="0.5"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace" role="img" aria-label="maritime and ports: pilot's chart, signed and current">
  <title>emem for maritime &amp; port operations</title>
  <desc>The pilot's view of an approach: bathymetry from GMRT, vessel positions from AIS, current weather and tide, surge warnings — all attested at the cell, all signed, all verifiable on a tablet without signal.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0a0a18"/><stop offset="1" stop-color="#02050f"/></linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1e3aff"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 L0 0 0 40" fill="none" stroke="#101637" stroke-width="0.6"/></pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.7"/>

  <text x="80" y="86" font-size="15" fill="#9aa3b8" letter-spacing="3">FOR · PORT AUTHORITIES · TERMINAL OPS · PILOTS · UNDERWRITERS · COAST GUARD</text>
  <text x="80" y="138" font-size="38" fill="#eaeaea" font-weight="700">a pilot's chart, signed and current.</text>
  <text x="1840" y="86" text-anchor="end" font-size="15" fill="#9aa3b8" letter-spacing="3">30 / 30 · emem.dev</text>
  <line x1="80" y1="170" x2="1840" y2="170" stroke="#1f2752"/>

  <!-- chart: a stylised approach channel with bathymetry, vessel paths, and a fact panel -->
  <g transform="translate(120,210)">
    <text x="0" y="0" font-size="14" fill="#9aa3b8" letter-spacing="2">APPROACH · 14 NM · BATHYMETRY · AIS · TIDE · SURGE · SIGNED</text>

    <!-- water area -->
    <g transform="translate(0,30)">
      <rect width="1140" height="640" rx="14" fill="#0a0e26" stroke="#2a335f"/>

      <!-- bathy contours (concentric arcs deeper out, shallow inshore) -->
      <g fill="none" stroke="#1e3aff" stroke-width="1" opacity="0.5">
        <path d="M0 220 Q 600 80 1140 220"/>
        <path d="M0 280 Q 600 160 1140 280"/>
        <path d="M0 340 Q 600 240 1140 340"/>
        <path d="M0 400 Q 600 320 1140 400"/>
        <path d="M0 460 Q 600 400 1140 460"/>
      </g>
      <text x="20" y="80" font-size="11" fill="#7af9ff">−25 m</text>
      <text x="20" y="200" font-size="11" fill="#7af9ff">−18 m</text>
      <text x="20" y="320" font-size="11" fill="#7af9ff">−12 m</text>
      <text x="20" y="440" font-size="11" fill="#7af9ff">−8 m</text>
      <text x="20" y="540" font-size="11" fill="#7af9ff">−5 m</text>

      <!-- shoreline at the bottom -->
      <path d="M0 600 L0 640 L1140 640 L1140 580 L1000 560 L800 590 L600 540 L400 580 L200 560 L0 600 Z"
            fill="#0e1130" stroke="#2a335f"/>

      <!-- terminal & berths -->
      <g transform="translate(640,560)" font-size="11" fill="#cfd9ff">
        <rect width="180" height="22" rx="2" fill="#10153a" stroke="#2a335f"/>
        <text x="10" y="16">Terminal · 6 berths</text>
      </g>

      <!-- channel centreline -->
      <path d="M40 200 Q 600 280 1100 540" fill="none" stroke="url(#acc)" stroke-width="3" stroke-dasharray="6 6"/>

      <!-- inbound vessel + outbound vessel -->
      <g>
        <g>
          <polygon points="0,-12 10,8 0,4 -10,8" fill="#62f5a3"/>
          <text x="14" y="6" font-size="11" fill="#62f5a3">MV LOTUS · TEU 18,000 · 12.4 kn</text>
          <animateMotion dur="14s" repeatCount="indefinite" rotate="auto" path="M40 200 Q 600 280 1100 540"/>
        </g>
        <g>
          <polygon points="0,-12 10,8 0,4 -10,8" fill="#ffb86b"/>
          <text x="14" y="6" font-size="11" fill="#ffb86b">MV ORION · 7.8 kn outbound</text>
          <animateMotion dur="16s" repeatCount="indefinite" rotate="auto" path="M1100 540 Q 600 280 40 200"/>
        </g>
      </g>

      <!-- a hazard cell -->
      <g transform="translate(540,360)">
        <rect x="-26" y="-26" width="52" height="52" fill="none" stroke="#ff5d8f" stroke-width="2"/>
        <circle r="32" fill="none" stroke="#ff5d8f">
          <animate attributeName="r" values="14;42;14" dur="2.4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.9;0;0.9" dur="2.4s" repeatCount="indefinite"/>
        </circle>
        <text x="0" y="-32" text-anchor="middle" font-size="11" fill="#ff5d8f">⚠ shoaling +0.4 m</text>
      </g>

      <text x="1110" y="20" text-anchor="end" font-size="11" fill="#6c7396">cell pitch ~9.55 m · cell64</text>
    </g>

    <!-- right panel: signed bands at the hazard cell -->
    <g transform="translate(1180,30)">
      <rect width="560" height="640" rx="14" fill="#0a0e26" stroke="url(#acc)" stroke-width="1.5"/>
      <text x="20" y="38" font-size="13" fill="#9aa3b8" letter-spacing="2">CELL DEFI.ZB44A.W6IO.ZN18C · 18:42 UTC</text>
      <text x="20" y="74" font-size="22" fill="#eaeaea" font-weight="700">live fact bundle</text>

      <g transform="translate(20,108)" font-family="ui-monospace" font-size="13" fill="#cfd9ff">
        <g><rect width="520" height="34" rx="4" fill="#10153a"/><text x="14" y="22">gmrt.topobathy_mean      −11.4 m</text></g>
        <g transform="translate(0,40)"><rect width="520" height="34" rx="4" fill="#10153a"/><text x="14" y="22">tide.height_now           +1.8 m</text></g>
        <g transform="translate(0,80)"><rect width="520" height="34" rx="4" fill="#10153a"/><text x="14" y="22">weather.wind_speed_10m    14 m/s</text></g>
        <g transform="translate(0,120)"><rect width="520" height="34" rx="4" fill="#10153a"/><text x="14" y="22">weather.wind_direction    245°</text></g>
        <g transform="translate(0,160)"><rect width="520" height="34" rx="4" fill="#10153a"/><text x="14" y="22">marine.current_speed       1.1 m/s</text></g>
        <g transform="translate(0,200)"><rect width="520" height="34" rx="4" fill="#10153a"/><text x="14" y="22">marine.surge_residual     +0.4 m</text></g>
        <g transform="translate(0,240)"><rect width="520" height="34" rx="4" fill="#10153a"/><text x="14" y="22">ais.dwell_min_60          17 vessels</text></g>
        <g transform="translate(0,280)"><rect width="520" height="34" rx="4" fill="#10153a" stroke="#ff5d8f" stroke-width="1.5"/><text x="14" y="22" fill="#ff5d8f">bathy.delta_30d           +0.4 m  ⚠</text></g>
      </g>

      <text x="20" y="448" font-size="13" fill="#9aa3b8" letter-spacing="2">UNDERKEEL CALC</text>
      <text x="20" y="478" font-family="ui-monospace" font-size="14" fill="#cfd9ff">UKC = depth + tide − draft − safety</text>
      <text x="20" y="506" font-family="ui-monospace" font-size="14" fill="#cfd9ff">    = 11.4 + 1.8 − 12.6 − 0.6 = 0.0 m</text>
      <text x="20" y="540" font-size="14" fill="#ff5d8f">⚠ tug escort + speed cap recommended</text>

      <g transform="translate(20,560)">
        <rect width="520" height="60" rx="8" fill="#0a0e26" stroke="#62f5a3"/>
        <text x="14" y="24" font-size="12" fill="#9aa3b8" letter-spacing="2">PILOTAGE RECEIPT</text>
        <text x="14" y="46" font-family="ui-monospace" font-size="13" fill="#62f5a3">8 facts · merkle 0xb12a…ce · ed25519 sig 0x4a91…ce</text>
      </g>
    </g>

    <!-- packet animation in to fact panel -->
    <g>
      <circle r="6" fill="#7af9ff">
        <animateMotion dur="3s" repeatCount="indefinite" path="M540 360 L1180 350"/>
      </circle>
    </g>
  </g>

  <text x="960" y="970" text-anchor="middle" font-size="32" fill="#eaeaea">A pilot, a port authority, and an underwriter — looking at the same byte.</text>
  <g transform="translate(80,1040)" font-size="13" fill="#6c7396">
    <text x="0" y="0">Inputs: GMRT bathy, Open-Meteo marine, ERA5 winds, AIS dwell, IHO S-101 chart-ready exports.</text>
    <text x="1760" y="0" text-anchor="end">IMO MASS · IHO S-100 · port-state control friendly</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace" role="img" aria-label="land registry: a parcel record where tampering is mathematical, not legal">
  <title>emem for land registry &amp; cadastre</title>
  <desc>Each parcel is a small set of facts at a polygon: boundary, owner-of-record CID, encumbrances, geophysics. Mutating any cell-level fact changes the CID. Tampering becomes mathematically detectable, not just legally actionable.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0a0a18"/><stop offset="1" stop-color="#02050f"/></linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1e3aff"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 L0 0 0 40" fill="none" stroke="#101637" stroke-width="0.6"/></pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.7"/>

  <text x="80" y="86" font-size="15" fill="#9aa3b8" letter-spacing="3">FOR · NATIONAL LAND REGISTRIES · CADASTRES · TITLE INSURERS</text>
  <text x="80" y="138" font-size="38" fill="#eaeaea" font-weight="700">a parcel record where tampering is mathematical, not legal.</text>
  <text x="1840" y="86" text-anchor="end" font-size="15" fill="#9aa3b8" letter-spacing="3">18 / 30 · emem.dev</text>

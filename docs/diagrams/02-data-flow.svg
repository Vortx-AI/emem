<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace" role="img" aria-label="how data moves through emem from upstream pixel to signed receipt">
  <title>emem — how data moves</title>
  <desc>A pixel from open data passes through fetch, decode, materialize, canonical CBOR, blake3 hashing into a Fact CID, then attestation, sled cache, Merkle log, and finally a signed receipt to the caller.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a18"/>
      <stop offset="1" stop-color="#02050f"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e3aff"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#101637" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.7"/>

  <g fill="#eaeaea">
    <text x="80" y="100" font-size="46" font-weight="700">how data moves</text>
    <text x="80" y="138" font-size="22" fill="#9aa3b8" letter-spacing="2">PIXEL → FACT → CID → RECEIPT</text>
  </g>
  <text x="1840" y="100" text-anchor="end" font-size="20" fill="#9aa3b8">02 / 10</text>
  <line x1="80" y1="160" x2="1840" y2="160" stroke="#1f2752" stroke-width="1"/>

  <!-- horizontal track -->
  <g transform="translate(0,300)">
    <line x1="120" y1="160" x2="1800" y2="160" stroke="#2a335f" stroke-width="1"/>
  </g>

  <!-- stages -->
  <g font-size="16">
    <!-- 1. upstream pixel -->
    <g transform="translate(120,360)">
      <rect width="220" height="180" rx="12" fill="#0e1330" stroke="#2a335f"/>
      <text x="20" y="36" fill="#9aa3b8" letter-spacing="2" font-size="13">01 · UPSTREAM</text>
      <text x="20" y="68" fill="#eaeaea" font-size="18">open pixel</text>
      <text x="20" y="98" fill="#cfd9ff" font-size="13">Sentinel-2 · Cop-DEM</text>
      <text x="20" y="118" fill="#cfd9ff" font-size="13">JRC GSW · GMRT</text>
      <text x="20" y="138" fill="#cfd9ff" font-size="13">met.no · Tessera …</text>
      <text x="20" y="166" fill="#7af9ff" font-size="12">vsicurl Range read</text>
    </g>

    <!-- 2. fetch dispatcher -->
    <g transform="translate(380,360)">
      <rect width="220" height="180" rx="12" fill="#0e1330" stroke="#2a335f"/>
      <text x="20" y="36" fill="#9aa3b8" letter-spacing="2" font-size="13">02 · FETCH</text>
      <text x="20" y="68" fill="#eaeaea" font-size="18">connector</text>
      <text x="20" y="98" fill="#cfd9ff" font-size="13">cog · stac · firms</text>
      <text x="20" y="118" fill="#cfd9ff" font-size="13">hansen · overture …</text>
      <text x="20" y="138" fill="#cfd9ff" font-size="13">429 → Retry-After</text>
      <text x="20" y="166" fill="#7af9ff" font-size="12">stateless dispatch</text>
    </g>

    <!-- 3. materialize -->
    <g transform="translate(640,360)">
      <rect width="220" height="180" rx="12" fill="#0e1330" stroke="#2a335f"/>
      <text x="20" y="36" fill="#9aa3b8" letter-spacing="2" font-size="13">03 · MATERIALIZE</text>
      <text x="20" y="68" fill="#eaeaea" font-size="18">decode · sample</text>
      <text x="20" y="98" fill="#cfd9ff" font-size="13">function-keyed</text>
      <text x="20" y="118" fill="#cfd9ff" font-size="13">PrimaryFact</text>
      <text x="20" y="138" fill="#cfd9ff" font-size="13">DerivativeFact</text>
      <text x="20" y="166" fill="#ff5d8f" font-size="12">water → NegativeFact</text>
    </g>

    <!-- 4. canonical CBOR -->
    <g transform="translate(900,360)">
      <rect width="220" height="180" rx="12" fill="#0e1330" stroke="#2a335f"/>
      <text x="20" y="36" fill="#9aa3b8" letter-spacing="2" font-size="13">04 · ENCODE</text>
      <text x="20" y="68" fill="#eaeaea" font-size="18">canonical CBOR</text>
      <text x="20" y="98" fill="#cfd9ff" font-size="13">ciborium</text>
      <text x="20" y="118" fill="#cfd9ff" font-size="13">deterministic</text>
      <text x="20" y="138" fill="#cfd9ff" font-size="13">field order pinned</text>
      <text x="20" y="166" fill="#7af9ff" font-size="12">byte-identical re-encode</text>
    </g>

    <!-- 5. CID -->
    <g transform="translate(1160,360)">
      <rect width="220" height="180" rx="12" fill="#0e1330" stroke="url(#acc)" stroke-width="2"/>
      <text x="20" y="36" fill="#9aa3b8" letter-spacing="2" font-size="13">05 · ADDRESS</text>
      <text x="20" y="68" fill="#eaeaea" font-size="18">FactCid</text>
      <text x="20" y="98" fill="#cfd9ff" font-size="13">blake3-32</text>
      <text x="20" y="118" fill="#cfd9ff" font-size="13">base32-nopad</text>
      <text x="20" y="138" fill="#cfd9ff" font-size="13">26 chars</text>
      <text x="20" y="166" fill="#7af9ff" font-size="12">qi3jo4sqcg…l2hgjt</text>
    </g>

    <!-- 6. attestation -->
    <g transform="translate(1420,360)">
      <rect width="220" height="180" rx="12" fill="#0e1330" stroke="#2a335f"/>
      <text x="20" y="36" fill="#9aa3b8" letter-spacing="2" font-size="13">06 · ATTEST</text>
      <text x="20" y="68" fill="#eaeaea" font-size="18">merkle batch</text>
      <text x="20" y="98" fill="#cfd9ff" font-size="13">sort leaves</text>
      <text x="20" y="118" fill="#cfd9ff" font-size="13">ed25519 sign</text>
      <text x="20" y="138" fill="#cfd9ff" font-size="13">verify-on-write</text>
      <text x="20" y="166" fill="#7af9ff" font-size="12">no bypass paths</text>
    </g>
  </g>

  <!-- second tier: persistence + receipt -->
  <g font-size="16">
    <g transform="translate(380,720)">
      <rect width="220" height="160" rx="12" fill="#0e1330" stroke="#2a335f"/>
      <text x="20" y="36" fill="#9aa3b8" letter-spacing="2" font-size="13">07a · CACHE</text>
      <text x="20" y="68" fill="#eaeaea" font-size="18">sled hot tier</text>
      <text x="20" y="98" fill="#cfd9ff" font-size="13">canonical_index</text>
      <text x="20" y="118" fill="#cfd9ff" font-size="13">facts · fact_proofs</text>
    </g>
    <g transform="translate(720,720)">
      <rect width="220" height="160" rx="12" fill="#0e1330" stroke="#2a335f"/>
      <text x="20" y="36" fill="#9aa3b8" letter-spacing="2" font-size="13">07b · LOG</text>
      <text x="20" y="68" fill="#eaeaea" font-size="18">merkle.log</text>
      <text x="20" y="98" fill="#cfd9ff" font-size="13">[len][CBOR][hash]</text>
      <text x="20" y="118" fill="#cfd9ff" font-size="13">fsync before ack</text>
    </g>
    <g transform="translate(1060,720)">
      <rect width="220" height="160" rx="12" fill="#0e1330" stroke="#2a335f"/>
      <text x="20" y="36" fill="#9aa3b8" letter-spacing="2" font-size="13">07c · PROOF</text>
      <text x="20" y="68" fill="#eaeaea" font-size="18">inclusion path</text>
      <text x="20" y="98" fill="#cfd9ff" font-size="13">{leaf_index, path}</text>
      <text x="20" y="118" fill="#cfd9ff" font-size="13">embedded in receipt</text>
    </g>
    <g transform="translate(1420,720)">
      <rect width="220" height="160" rx="12" fill="#0e1330" stroke="url(#acc)" stroke-width="2"/>
      <text x="20" y="36" fill="#9aa3b8" letter-spacing="2" font-size="13">08 · RECEIPT</text>
      <text x="20" y="68" fill="#eaeaea" font-size="18">to caller</text>
      <text x="20" y="98" fill="#cfd9ff" font-size="13">signature · pubkey</text>
      <text x="20" y="118" fill="#cfd9ff" font-size="13">verifies offline</text>
    </g>
  </g>

  <!-- arrows top row -->
  <g fill="none" stroke="#3a3f6f" stroke-width="1.5">
    <path d="M340 450 L380 450" marker-end="url(#a1)"/>
    <path d="M600 450 L640 450" marker-end="url(#a1)"/>
    <path d="M860 450 L900 450" marker-end="url(#a1)"/>
    <path d="M1120 450 L1160 450" marker-end="url(#a1)"/>
    <path d="M1380 450 L1420 450" marker-end="url(#a1)"/>
  </g>

  <!-- arrows attest → 7a/7b/7c -->
  <g fill="none" stroke="#3a3f6f" stroke-width="1.5">
    <path d="M1530 540 L1530 640 L490 640 L490 720" marker-end="url(#a1)"/>
    <path d="M1530 540 L1530 660 L830 660 L830 720" marker-end="url(#a1)"/>
    <path d="M1530 540 L1530 680 L1170 680 L1170 720" marker-end="url(#a1)"/>
    <!-- 7c → receipt -->
    <path d="M1280 800 L1420 800" marker-end="url(#a1)"/>
  </g>

  <!-- packets -->
  <g>
    <circle r="5" fill="#7af9ff">
      <animateMotion dur="6s" repeatCount="indefinite" rotate="auto"
        path="M230 540 L230 450 L380 450 L640 450 L900 450 L1160 450 L1420 450 L1530 540 L1530 640 L490 640 L490 720"/>
    </circle>
    <circle r="5" fill="#7af9ff" opacity="0.55">
      <animateMotion dur="6s" begin="2s" repeatCount="indefinite" rotate="auto"
        path="M230 540 L230 450 L380 450 L640 450 L900 450 L1160 450 L1420 450 L1530 540 L1530 660 L830 660 L830 720"/>
    </circle>
    <circle r="5" fill="#62f5a3">
      <animateMotion dur="3s" begin="3s" repeatCount="indefinite" rotate="auto"
        path="M1280 800 L1420 800"/>
    </circle>
  </g>

  <!-- side-note: deterministic property -->
  <g transform="translate(120,720)">
    <rect width="220" height="160" rx="12" fill="#0a0e26" stroke="#3a3f6f" stroke-dasharray="4 4"/>
    <text x="20" y="34" font-size="13" fill="#9aa3b8" letter-spacing="2">INVARIANT</text>
    <text x="20" y="64" font-size="14" fill="#cfd9ff">Same upstream</text>
    <text x="20" y="86" font-size="14" fill="#cfd9ff">Same registries</text>
    <text x="20" y="108" font-size="14" fill="#cfd9ff">Same algorithm</text>
    <text x="20" y="130" font-size="14" fill="#7af9ff">→ same CID, byte-for-byte</text>
  </g>

  <!-- footer -->
  <g transform="translate(80,1000)" font-size="14" fill="#9aa3b8">
    <circle cx="6" cy="-4" r="5" fill="#7af9ff"/>
    <text x="20" y="0">data path</text>
    <circle cx="116" cy="-4" r="5" fill="#62f5a3"/>
    <text x="130" y="0">return to caller</text>
    <text x="1760" y="0" text-anchor="end" fill="#6c7396">primitive: emem.recall</text>
  </g>
</svg>

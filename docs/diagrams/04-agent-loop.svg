<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace" role="img" aria-label="how an AI agent actually uses emem">
  <title>emem — how agents use it</title>
  <desc>The standard agent loop: discover, locate, recall, reason, verify. The agent reads tools, geocodes a place, recalls bands, plans next call, optionally verifies the receipt offline before it cites anything to its user.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a18"/>
      <stop offset="1" stop-color="#02050f"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e3aff"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#101637" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.7"/>

  <g fill="#eaeaea">
    <text x="80" y="100" font-size="46" font-weight="700">how an agent uses emem</text>
    <text x="80" y="138" font-size="22" fill="#9aa3b8" letter-spacing="2">DISCOVER · LOCATE · RECALL · REASON · VERIFY</text>
  </g>
  <text x="1840" y="100" text-anchor="end" font-size="20" fill="#9aa3b8">04 / 10</text>
  <line x1="80" y1="160" x2="1840" y2="160" stroke="#1f2752" stroke-width="1"/>

  <!-- circular agent loop -->
  <g transform="translate(960,580)">
    <circle r="320" fill="none" stroke="#2a335f" stroke-width="1" stroke-dasharray="3 5"/>
    <circle r="220" fill="none" stroke="#2a335f" stroke-width="1"/>

    <!-- centre: the agent -->
    <g>
      <circle r="120" fill="#0e1330" stroke="url(#acc)" stroke-width="2"/>
      <text y="-20" text-anchor="middle" font-size="22" fill="#eaeaea" font-weight="700">the agent</text>
      <text y="14" text-anchor="middle" font-size="14" fill="#9aa3b8">LLM + planner</text>
      <text y="42" text-anchor="middle" font-size="14" fill="#9aa3b8">no spatial memory</text>
      <text y="70" text-anchor="middle" font-size="14" fill="#7af9ff">until it calls /v1/*</text>
    </g>

    <!-- 5 stations around the loop -->
    <!-- 1. discover (top) -->
    <g transform="translate(0,-320)">
      <rect x="-150" y="-58" width="300" height="116" rx="14" fill="#0e1330" stroke="#2a335f"/>
      <text x="-138" y="-32" font-size="13" fill="#9aa3b8" letter-spacing="2">01 · DISCOVER</text>
      <text x="-138" y="-4" font-size="16" fill="#eaeaea">GET /v1/agent_card</text>
      <text x="-138" y="20" font-size="13" fill="#cfd9ff">/v1/manifests</text>
      <text x="-138" y="40" font-size="13" fill="#cfd9ff">/v1/grid_info · /v1/data_availability</text>
    </g>

    <!-- 2. locate (right-top) -->
    <g transform="translate(305,-100)">
      <rect x="-130" y="-58" width="300" height="116" rx="14" fill="#0e1330" stroke="#2a335f"/>
      <text x="-118" y="-32" font-size="13" fill="#9aa3b8" letter-spacing="2">02 · LOCATE</text>
      <text x="-118" y="-4" font-size="16" fill="#eaeaea">POST /v1/locate</text>
      <text x="-118" y="20" font-size="13" fill="#cfd9ff">{"q": "Bengaluru"}</text>
      <text x="-118" y="40" font-size="13" fill="#7af9ff">→ defi.zb493.xoso.zcb6a</text>
    </g>

    <!-- 3. recall (right-bottom) -->
    <g transform="translate(305,200)">
      <rect x="-130" y="-58" width="300" height="116" rx="14" fill="#0e1330" stroke="url(#acc)" stroke-width="1.5"/>
      <text x="-118" y="-32" font-size="13" fill="#9aa3b8" letter-spacing="2">03 · RECALL</text>
      <text x="-118" y="-4" font-size="16" fill="#eaeaea">POST /v1/recall</text>
      <text x="-118" y="20" font-size="13" fill="#cfd9ff">cell · bands[ ]</text>
      <text x="-118" y="40" font-size="13" fill="#7af9ff">→ facts + receipt</text>
    </g>

    <!-- 4. reason (left-bottom) -->
    <g transform="translate(-305,200)">
      <rect x="-150" y="-58" width="300" height="116" rx="14" fill="#0e1330" stroke="#2a335f"/>
      <text x="-138" y="-32" font-size="13" fill="#9aa3b8" letter-spacing="2">04 · REASON</text>
      <text x="-138" y="-4" font-size="16" fill="#eaeaea">plan next call</text>
      <text x="-138" y="20" font-size="13" fill="#cfd9ff">find_similar · trajectory</text>
      <text x="-138" y="40" font-size="13" fill="#cfd9ff">compare · diff · query_region</text>
    </g>

    <!-- 5. verify (left-top) -->
    <g transform="translate(-305,-100)">
      <rect x="-150" y="-58" width="300" height="116" rx="14" fill="#0e1330" stroke="#62f5a3" stroke-width="1.5"/>
      <text x="-138" y="-32" font-size="13" fill="#9aa3b8" letter-spacing="2">05 · VERIFY</text>
      <text x="-138" y="-4" font-size="16" fill="#eaeaea">offline check</text>
      <text x="-138" y="20" font-size="13" fill="#cfd9ff">ed25519 · blake3</text>
      <text x="-138" y="40" font-size="13" fill="#cfd9ff">no callback to issuer</text>
    </g>

    <!-- arrows around -->
    <g fill="none" stroke="#3a3f6f" stroke-width="1.5">
      <path d="M150 -300 A 300 300 0 0 1 290 -160" marker-end="url(#a1)"/>
      <path d="M310 -50 A 300 300 0 0 1 310 150" marker-end="url(#a1)"/>
      <path d="M150 280 A 300 300 0 0 1 -150 280" marker-end="url(#a1)"/>
      <path d="M-310 150 A 300 300 0 0 1 -310 -50" marker-end="url(#a1)"/>
      <path d="M-290 -160 A 300 300 0 0 1 -150 -300" marker-end="url(#a1)"/>
    </g>

    <!-- moving traveller -->
    <circle r="6" fill="#7af9ff">
      <animateMotion dur="12s" repeatCount="indefinite" rotate="auto"
        path="M0 -300 A 300 300 0 0 1 0 300 A 300 300 0 0 1 0 -300"/>
    </circle>
  </g>

  <!-- side notes -->
  <g transform="translate(80,260)">
    <text x="0" y="0" font-size="18" fill="#9aa3b8" letter-spacing="2">FIRST CONTACT</text>
    <text x="0" y="32" font-size="14" fill="#cfd9ff">No login. No key.</text>
    <text x="0" y="54" font-size="14" fill="#cfd9ff">Same wire for REST and MCP.</text>
    <text x="0" y="76" font-size="14" fill="#cfd9ff">Discovery is itself a primitive.</text>
  </g>

  <g transform="translate(1660,260)">
    <text x="0" y="0" font-size="18" fill="#9aa3b8" letter-spacing="2">WHAT THE AGENT GAINS</text>
    <text x="0" y="32" font-size="14" fill="#cfd9ff">A stable address per place.</text>
    <text x="0" y="54" font-size="14" fill="#cfd9ff">A citation for every claim.</text>
    <text x="0" y="76" font-size="14" fill="#cfd9ff">Determinism across runs.</text>
  </g>

  <!-- bottom legend -->
  <g transform="translate(80,1010)" font-size="14" fill="#9aa3b8">
    <text x="0" y="0">The loop is open: skip discover after first contact, skip verify when receipts are batched downstream.</text>
    <text x="1760" y="0" text-anchor="end" fill="#6c7396">examples/langchain.py · examples/llamaindex.py</text>
  </g>
</svg>

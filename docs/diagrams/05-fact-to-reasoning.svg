<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace" role="img" aria-label="how a fact reaches an agent's reasoning context">
  <title>emem — fact to reasoning</title>
  <desc>A signed fact lands in the agent's context window as a tuple of address, value, provenance, CID, and receipt. The agent reasons over the value but cites the CID, so its answer is both grounded and reproducible.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a18"/>
      <stop offset="1" stop-color="#02050f"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e3aff"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#101637" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.7"/>

  <g fill="#eaeaea">
    <text x="80" y="100" font-size="46" font-weight="700">fact → reasoning</text>
    <text x="80" y="138" font-size="22" fill="#9aa3b8" letter-spacing="2">HOW GROUNDING ENTERS THE CONTEXT WINDOW</text>
  </g>
  <text x="1840" y="100" text-anchor="end" font-size="20" fill="#9aa3b8">05 / 10</text>
  <line x1="80" y1="160" x2="1840" y2="160" stroke="#1f2752" stroke-width="1"/>

  <!-- left: emem responder gives a fact -->
  <g transform="translate(120,260)">
    <rect width="540" height="540" rx="16" fill="#0a0e26" stroke="url(#acc)" stroke-width="1.5"/>
    <text x="20" y="42" font-size="20" fill="#eaeaea" font-weight="700">signed fact (JSON)</text>
    <text x="20" y="66" font-size="13" fill="#9aa3b8">returned by /v1/recall</text>
    <g font-size="14" fill="#cfd9ff">
      <text x="20" y="116">{</text>
      <text x="40" y="142">"band":   "weather.temperature_2m",</text>
      <text x="40" y="166">"cell":   "defi.zb493.xoso.zcb6a",</text>
      <text x="40" y="190">"tslot":  "t.aaaaagy",</text>
      <text x="40" y="214">"value":  30.9,</text>
      <text x="40" y="238">"unit":   "degC",</text>
      <text x="40" y="262">"derivation": { "fn_key": "met_no.now" },</text>
      <text x="40" y="286">"source":  "met.no",</text>
      <text x="40" y="310">"captured_at": "2026-05-09T08:55Z",</text>
      <text x="40" y="334">"signed_at":   "2026-05-09T08:56Z",</text>
      <text x="40" y="358" fill="#7af9ff">"fact_cid":   "qi3jo4sqcg…l2hgjt"</text>
      <text x="20" y="384">}</text>
      <text x="20" y="430" fill="#9aa3b8">+ receipt {</text>
      <text x="40" y="454" fill="#cfd9ff">  responder_pubkey,</text>
      <text x="40" y="478" fill="#cfd9ff">  signature, merkle_proof</text>
      <text x="20" y="502" fill="#9aa3b8">}</text>
    </g>
  </g>

  <!-- middle: the agent's prompt assembly -->
  <g transform="translate(720,260)">
    <rect width="480" height="540" rx="16" fill="#0a0e26" stroke="#2a335f"/>
    <text x="20" y="42" font-size="20" fill="#eaeaea" font-weight="700">context window</text>
    <text x="20" y="66" font-size="13" fill="#9aa3b8">what the LLM actually sees</text>
    <g font-size="14" fill="#cfd9ff">
      <text x="20" y="116">SYSTEM</text>
      <text x="20" y="138" fill="#9aa3b8">cite by fact_cid; do not paraphrase</text>
      <text x="20" y="160" fill="#9aa3b8">numbers without one.</text>

      <text x="20" y="200">USER</text>
      <text x="20" y="222" fill="#9aa3b8">"What's the air temperature in</text>
      <text x="20" y="242" fill="#9aa3b8"> Bengaluru right now?"</text>

      <text x="20" y="282">TOOL emem.recall →</text>
      <text x="40" y="304">band: weather.temperature_2m</text>
      <text x="40" y="324">value: 30.9 °C</text>
      <text x="40" y="344">cell: defi.zb493.xoso.zcb6a</text>
      <text x="40" y="364">cid:  qi3jo4sqcg…l2hgjt</text>

      <text x="20" y="404">ASSISTANT</text>
      <text x="20" y="426" fill="#62f5a3">"30.9 °C, observed by met.no</text>
      <text x="20" y="446" fill="#62f5a3"> at 08:55 UTC. Citation:</text>
      <text x="20" y="466" fill="#62f5a3"> qi3jo4sqcg…l2hgjt"</text>
    </g>
  </g>

  <!-- right: what reasoning gains -->
  <g transform="translate(1260,260)">
    <rect width="540" height="540" rx="16" fill="#0a0e26" stroke="#2a335f"/>
    <text x="20" y="42" font-size="20" fill="#eaeaea" font-weight="700">what changes in reasoning</text>
    <g>
      <g transform="translate(20,90)">
        <rect width="500" height="92" rx="10" fill="#10153a" stroke="#2a335f"/>
        <text x="16" y="32" font-size="14" fill="#9aa3b8" letter-spacing="2">GROUNDING</text>
        <text x="16" y="58" font-size="15" fill="#cfd9ff">numbers carry an address;</text>
        <text x="16" y="78" font-size="15" fill="#cfd9ff">"30.9 °C" → (cell, band, tslot, cid).</text>
      </g>
      <g transform="translate(20,200)">
        <rect width="500" height="92" rx="10" fill="#10153a" stroke="#2a335f"/>
        <text x="16" y="32" font-size="14" fill="#9aa3b8" letter-spacing="2">CITATION</text>
        <text x="16" y="58" font-size="15" fill="#cfd9ff">the answer is reproducible;</text>
        <text x="16" y="78" font-size="15" fill="#cfd9ff">re-querying the cid returns same bytes.</text>
      </g>
      <g transform="translate(20,310)">
        <rect width="500" height="92" rx="10" fill="#10153a" stroke="#2a335f"/>
        <text x="16" y="32" font-size="14" fill="#9aa3b8" letter-spacing="2">DETERMINISM</text>
        <text x="16" y="58" font-size="15" fill="#cfd9ff">two runs of the same plan</text>
        <text x="16" y="78" font-size="15" fill="#cfd9ff">cite the same cid, period.</text>
      </g>
      <g transform="translate(20,420)">
        <rect width="500" height="92" rx="10" fill="#10153a" stroke="#62f5a3" stroke-width="1.5"/>
        <text x="16" y="32" font-size="14" fill="#9aa3b8" letter-spacing="2">VERIFIABILITY</text>
        <text x="16" y="58" font-size="15" fill="#cfd9ff">a downstream auditor checks</text>
        <text x="16" y="78" font-size="15" fill="#cfd9ff">the receipt offline, no callback.</text>
      </g>
    </g>
  </g>

  <!-- arrows -->
  <g fill="none" stroke="#3a3f6f" stroke-width="1.5">
    <path d="M660 530 L720 530" marker-end="url(#a1)"/>
    <path d="M1200 530 L1260 530" marker-end="url(#a1)"/>
  </g>

  <!-- moving citation packet that flows fact → context → reasoning -->
  <g>
    <rect x="-26" y="-12" width="52" height="24" rx="6" fill="#0e1330" stroke="#7af9ff">
      <animateMotion dur="6s" repeatCount="indefinite" rotate="0"
        path="M660 530 L720 530 L1200 530 L1260 530"/>
    </rect>
    <text font-size="11" fill="#7af9ff" text-anchor="middle">
      <animateMotion dur="6s" repeatCount="indefinite" rotate="0"
        path="M660 530 L720 530 L1200 530 L1260 530"/>
      cid
    </text>
  </g>

  <!-- bottom strip: contrast -->
  <g transform="translate(120,860)">
    <rect width="1680" height="120" rx="14" fill="#0a0e26" stroke="#2a335f"/>
    <g font-size="15" fill="#cfd9ff">
      <text x="24" y="38" fill="#ff5d8f">without emem</text>
      <text x="24" y="64">"It's about 30 degrees in Bengaluru" — no time, no source, no way to disprove.</text>
      <text x="24" y="92">Two runs return different numbers; both feel confident; both are unfalsifiable.</text>

      <text x="900" y="38" fill="#62f5a3">with emem</text>
      <text x="900" y="64">30.9 °C @ defi.zb493.xoso.zcb6a / t.aaaaagy / cid qi3jo4sqcg…</text>
      <text x="900" y="92">Re-runnable, attributable to met.no, signature checks against published pubkey.</text>
    </g>
  </g>

  <text x="80" y="1040" font-size="13" fill="#6c7396">A fact is a value plus the smallest address that makes the value re-fetchable.</text>
</svg>

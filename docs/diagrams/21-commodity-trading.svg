<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace" role="img" aria-label="commodity trading: a yield forecast where every field has a citation">
  <title>emem for soft-commodity trading desks</title>
  <desc>Wheat-belt yield forecast over 14 weeks, each weekly point a derived fact citing the underlying NDVI, soil moisture, and weather facts — content-addressed and re-runnable on Monday morning, year-on-year.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0a0a18"/><stop offset="1" stop-color="#02050f"/></linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1e3aff"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 L0 0 0 40" fill="none" stroke="#101637" stroke-width="0.6"/></pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.7"/>

  <text x="80" y="86" font-size="15" fill="#9aa3b8" letter-spacing="3">FOR · COMMODITY TRADERS · ABCD · TRADE FINANCE · CTRM DESKS</text>
  <text x="80" y="138" font-size="38" fill="#eaeaea" font-weight="700">trade on a yield forecast where every field has a citation.</text>
  <text x="1840" y="86" text-anchor="end" font-size="15" fill="#9aa3b8" letter-spacing="3">21 / 30 · emem.dev</text>
  <line x1="80" y1="170" x2="1840" y2="170" stroke="#1f2752"/>

  <!-- chart: yield curve with confidence band, weekly markers each tied to facts -->
  <g transform="translate(160,230)">
    <text x="0" y="0" font-size="14" fill="#9aa3b8" letter-spacing="2">FORECAST · WHEAT YIELD · BLACK-SEA REGION · t/ha · 14 WEEKS</text>
    <text x="1600" y="0" text-anchor="end" font-size="13" fill="#6c7396">illustrative · cell-aggregated · ~12,400 fields</text>

    <!-- axes -->
    <g stroke="#2a335f" stroke-width="1">
      <line x1="0" y1="540" x2="1600" y2="540"/>
      <line x1="0" y1="40" x2="0" y2="540"/>
    </g>
    <g font-size="12" fill="#6c7396">
      <text x="-10" y="546" text-anchor="end">2.5</text>
      <text x="-10" y="416" text-anchor="end">3.0</text>
      <text x="-10" y="286" text-anchor="end">3.5</text>
      <text x="-10" y="156" text-anchor="end">4.0</text>
      <text x="-10" y="46" text-anchor="end">4.5</text>
      <text x="0" y="566">w-1</text>
      <text x="800" y="566" text-anchor="middle">weeks before harvest →</text>
      <text x="1590" y="566" text-anchor="end">w-14</text>
    </g>

    <!-- confidence band -->
    <path d="M0 460 L120 430 L240 400 L360 380 L480 360 L600 340 L720 320 L840 300 L960 280 L1080 260 L1200 250 L1320 240 L1440 230 L1590 220
             L1590 280 L1440 290 L1320 300 L1200 310 L1080 320 L960 340 L840 360 L720 380 L600 400 L480 420 L360 440 L240 460 L120 490 L0 510 Z"
          fill="url(#acc)" opacity="0.16"/>

    <!-- forecast line -->
    <path d="M0 485 L120 460 L240 435 L360 412 L480 388 L600 362 L720 340 L840 318 L960 298 L1080 278 L1200 262 L1320 250 L1440 240 L1590 232"
          fill="none" stroke="url(#acc)" stroke-width="3"/>

    <!-- weekly markers with citation tooltips -->
    <g>
      <g>
        <circle cx="0"    cy="485" r="6" fill="#7af9ff"/>
        <circle cx="120"  cy="460" r="6" fill="#7af9ff"/>
        <circle cx="240"  cy="435" r="6" fill="#7af9ff"/>
        <circle cx="360"  cy="412" r="6" fill="#7af9ff"/>
        <circle cx="480"  cy="388" r="6" fill="#7af9ff"/>
        <circle cx="600"  cy="362" r="6" fill="#7af9ff"/>
        <circle cx="720"  cy="340" r="6" fill="#7af9ff"/>
        <circle cx="840"  cy="318" r="6" fill="#7af9ff"/>
        <circle cx="960"  cy="298" r="6" fill="#7af9ff"/>
        <circle cx="1080" cy="278" r="6" fill="#7af9ff"/>
        <circle cx="1200" cy="262" r="6" fill="#7af9ff"/>
        <circle cx="1320" cy="250" r="6" fill="#7af9ff"/>
        <circle cx="1440" cy="240" r="6" fill="#7af9ff"/>
        <circle cx="1590" cy="232" r="6" fill="#62f5a3"/>
      </g>
      <!-- highlighted callout for a single week -->
      <g transform="translate(720,340)">
        <line x1="0" y1="0" x2="0" y2="-200" stroke="#3a3f6f" stroke-dasharray="3 4"/>
        <g transform="translate(-160,-280)">
          <rect width="320" height="92" rx="10" fill="#0a0e26" stroke="url(#acc)" stroke-width="1.5"/>
          <text x="14" y="24" font-size="11" fill="#9aa3b8" letter-spacing="2">WEEK -7 · 3.66 t/ha</text>
          <text x="14" y="44" font-family="ui-monospace" font-size="11" fill="#cfd9ff">cited:</text>
          <text x="14" y="60" font-family="ui-monospace" font-size="11" fill="#cfd9ff">  modis.ndvi_mean   qi3jo4…</text>
          <text x="14" y="76" font-family="ui-monospace" font-size="11" fill="#cfd9ff">  era5.precip_30d   fb24m9…</text>
        </g>
      </g>
    </g>

    <!-- packet sweep -->
    <circle r="6" fill="#62f5a3">
      <animateMotion dur="6s" repeatCount="indefinite"
        path="M0 485 L120 460 L240 435 L360 412 L480 388 L600 362 L720 340 L840 318 L960 298 L1080 278 L1200 262 L1320 250 L1440 240 L1590 232"/>
    </circle>
  </g>

  <!-- bottom strip: model evidence rows -->
  <g transform="translate(160,830)">
    <text font-size="13" fill="#9aa3b8" letter-spacing="2">MODEL INPUTS · ALL CONTENT-ADDRESSED · ALL OPEN-DATA</text>
    <g transform="translate(0,30)" font-family="ui-monospace" font-size="13" fill="#cfd9ff">
      <g><rect width="380" height="36" rx="6" fill="#10153a"/><text x="14" y="24">modis.ndvi_mean</text></g>
      <g transform="translate(400,0)"><rect width="380" height="36" rx="6" fill="#10153a"/><text x="14" y="24">soilgrids.bdod_top10cm</text></g>
      <g transform="translate(800,0)"><rect width="380" height="36" rx="6" fill="#10153a"/><text x="14" y="24">era5.air_temperature_2m</text></g>
      <g transform="translate(1200,0)"><rect width="400" height="36" rx="6" fill="#10153a"/><text x="14" y="24">era5.precip_total_30d</text></g>
    </g>
  </g>

  <text x="960" y="950" text-anchor="middle" font-size="30" fill="#eaeaea">A weekly desk note that the back-office can replay in three years.</text>
  <g transform="translate(80,1040)" font-size="13" fill="#6c7396">
    <text x="0" y="0">Bands swap freely under sources_cid; the trader keeps the model, emem keeps the audit trail.</text>
    <text x="1760" y="0" text-anchor="end">desk-grade replay · MAR-style market abuse defensibility</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace" role="img" aria-label="grid resilience: transmission corridor risk facts that survive an audit">
  <title>emem for utility &amp; grid resilience</title>
  <desc>A 200 km transmission corridor with three rolling risk bands — vegetation encroachment, wildfire ignition probability, and flood/storm exposure — every cell signed and content-addressed for the post-incident inquiry.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0a0a18"/><stop offset="1" stop-color="#02050f"/></linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1e3aff"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 L0 0 0 40" fill="none" stroke="#101637" stroke-width="0.6"/></pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.7"/>

  <text x="80" y="86" font-size="15" fill="#9aa3b8" letter-spacing="3">FOR · UTILITIES · TSO/DSO · WILDFIRE OPS · PSPS DECISION-MAKERS</text>
  <text x="80" y="138" font-size="38" fill="#eaeaea" font-weight="700">transmission resilience facts that survive an audit.</text>
  <text x="1840" y="86" text-anchor="end" font-size="15" fill="#9aa3b8" letter-spacing="3">26 / 30 · emem.dev</text>
  <line x1="80" y1="170" x2="1840" y2="170" stroke="#1f2752"/>

  <!-- chart: corridor with three risk lanes -->
  <g transform="translate(120,230)">
    <text x="0" y="0" font-size="14" fill="#9aa3b8" letter-spacing="2">CORRIDOR · 200 KM · 3 RISK BANDS · ROLLING ATTESTATION</text>

    <!-- corridor -->
    <line x1="20" y1="80" x2="1660" y2="80" stroke="url(#acc)" stroke-width="6" opacity="0.6"/>
    <text x="20" y="60" font-size="11" fill="#6c7396">substation A</text>
    <text x="1660" y="60" text-anchor="end" font-size="11" fill="#6c7396">substation B</text>

    <!-- lane: vegetation encroachment -->
    <g transform="translate(0,140)">
      <text x="0" y="0" font-size="13" fill="#9aa3b8" letter-spacing="2">VEGETATION ENCROACHMENT · esa_worldcover + lidar.canopy_height</text>
      <rect x="20" y="20" width="1640" height="40" rx="6" fill="#10153a"/>
      <!-- segments of varying severity -->
      <rect x="20"   y="20" width="200" height="40" rx="6" fill="#62f5a3" opacity="0.55"/>
      <rect x="220"  y="20" width="180" height="40" fill="#ffb86b" opacity="0.55"/>
      <rect x="400"  y="20" width="240" height="40" fill="#62f5a3" opacity="0.55"/>
      <rect x="640"  y="20" width="120" height="40" fill="#ff5d8f" opacity="0.55"/>
      <rect x="760"  y="20" width="320" height="40" fill="#62f5a3" opacity="0.55"/>
      <rect x="1080" y="20" width="160" height="40" fill="#ffb86b" opacity="0.55"/>
      <rect x="1240" y="20" width="240" height="40" fill="#62f5a3" opacity="0.55"/>
      <rect x="1480" y="20" width="180" height="40" fill="#ff5d8f" opacity="0.55"/>
      <rect x="20" y="20" width="1640" height="40" rx="6" fill="none" stroke="#2a335f"/>
    </g>

    <!-- lane: wildfire ignition probability -->
    <g transform="translate(0,260)">
      <text x="0" y="0" font-size="13" fill="#9aa3b8" letter-spacing="2">WILDFIRE IGNITION PROB · firms + dryness + slope + wind</text>
      <rect x="20" y="20" width="1640" height="40" rx="6" fill="#10153a"/>
      <rect x="20"   y="20" width="120" height="40" rx="6" fill="#62f5a3" opacity="0.55"/>
      <rect x="140"  y="20" width="220" height="40" fill="#ff5d8f" opacity="0.55"/>
      <rect x="360"  y="20" width="160" height="40" fill="#ffb86b" opacity="0.55"/>
      <rect x="520"  y="20" width="320" height="40" fill="#62f5a3" opacity="0.55"/>
      <rect x="840"  y="20" width="180" height="40" fill="#ff5d8f" opacity="0.55"/>
      <rect x="1020" y="20" width="200" height="40" fill="#62f5a3" opacity="0.55"/>
      <rect x="1220" y="20" width="160" height="40" fill="#ffb86b" opacity="0.55"/>
      <rect x="1380" y="20" width="280" height="40" fill="#62f5a3" opacity="0.55"/>
      <rect x="20" y="20" width="1640" height="40" rx="6" fill="none" stroke="#2a335f"/>
    </g>

    <!-- lane: flood / storm -->
    <g transform="translate(0,380)">
      <text x="0" y="0" font-size="13" fill="#9aa3b8" letter-spacing="2">FLOOD &amp; STORM · jrc_gsw + cop_dem + era5 winds</text>
      <rect x="20" y="20" width="1640" height="40" rx="6" fill="#10153a"/>
      <rect x="20"   y="20" width="320" height="40" rx="6" fill="#62f5a3" opacity="0.55"/>
      <rect x="340"  y="20" width="120" height="40" fill="#ffb86b" opacity="0.55"/>
      <rect x="460"  y="20" width="240" height="40" fill="#62f5a3" opacity="0.55"/>
      <rect x="700"  y="20" width="80"  height="40" fill="#ff5d8f" opacity="0.55"/>
      <rect x="780"  y="20" width="320" height="40" fill="#62f5a3" opacity="0.55"/>
      <rect x="1100" y="20" width="180" height="40" fill="#ffb86b" opacity="0.55"/>
      <rect x="1280" y="20" width="160" height="40" fill="#62f5a3" opacity="0.55"/>
      <rect x="1440" y="20" width="220" height="40" fill="#ff5d8f" opacity="0.55"/>
      <rect x="20" y="20" width="1640" height="40" rx="6" fill="none" stroke="#2a335f"/>
    </g>

    <!-- legend + receipt -->
    <g transform="translate(0,500)" font-size="13" fill="#9aa3b8">
      <rect width="14" height="14" fill="#62f5a3" opacity="0.55"/><text x="22" y="12">low</text>
      <rect x="80" width="14" height="14" fill="#ffb86b" opacity="0.55"/><text x="102" y="12">elevated</text>
      <rect x="200" width="14" height="14" fill="#ff5d8f" opacity="0.55"/><text x="222" y="12">action threshold</text>
    </g>

    <!-- attest record -->
    <g transform="translate(0,540)">
      <rect width="1660" height="80" rx="10" fill="#0a0e26" stroke="#62f5a3"/>
      <text x="20" y="32" font-size="13" fill="#9aa3b8" letter-spacing="2">ROLLING ATTESTATION · 21,000 CELLS · DAILY · OFFLINE-VERIFIABLE</text>
      <text x="20" y="62" font-family="ui-monospace" font-size="14" fill="#62f5a3">today · merkle 0xb12ace7f…ceaa  ·  31,420 facts  ·  6 pubkeys  ·  0 disputes</text>
    </g>

    <!-- moving sweep over the lanes -->
    <g>
      <circle r="6" fill="#7af9ff">
        <animateMotion dur="6s" repeatCount="indefinite" path="M40 180 L1660 180"/>
      </circle>
      <circle r="6" fill="#ff5d8f">
        <animateMotion dur="6s" begin="2s" repeatCount="indefinite" path="M40 300 L1660 300"/>
      </circle>
      <circle r="6" fill="#62f5a3">
        <animateMotion dur="6s" begin="4s" repeatCount="indefinite" path="M40 420 L1660 420"/>
      </circle>
    </g>
  </g>

  <text x="960" y="970" text-anchor="middle" font-size="32" fill="#eaeaea">When the inquiry asks "what did you know and when," you point to the cid.</text>
  <g transform="translate(80,1040)" font-size="13" fill="#6c7396">
    <text x="0" y="0">PSPS, vegetation-management, EOP recovery — every decision pinned to a signed (cell, band, tslot).</text>
    <text x="1760" y="0" text-anchor="end">FERC · CPUC · ENTSO-E · NERC CIP-friendly</text>
  </g>
</svg>

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # The /docs/ site is rendered at build time by mdbook and baked into the
  # signed binary via `include_dir!("docs/book")` in emem-api-rest. The
  # output is gitignored, so every CI job that compiles emem-api-rest must
  # build the book first. Pinned to a known-good version.
  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.5.2'
      - run: mdbook build docs && rm -f docs/book/book.toml
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.5.2'
      - run: mdbook build docs && rm -f docs/book/book.toml
      - run: cargo test --workspace --release

  msrv:
    name: minimum supported rust 1.88
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.5.2'
      - run: mdbook build docs && rm -f docs/book/book.toml
      - run: cargo build --workspace

  # Surfaces RustSec advisories for our transitive deps. Fails only on
  # actual `vulnerability` advisories; informational findings
  # (e.g. sled is implicitly unmaintained — tracked, migration to redb
  # is on the deferred punch list) are reported but don't block the
  # build. We re-evaluate the ignore list whenever the advisory db
  # adds something. Plain `cargo audit` rather than the
  # `rustsec/audit-check` action because the action posts a GitHub
  # check-run, which requires `checks: write` we don't otherwise need.
  audit:
    name: cargo audit (advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit
        # Plain `cargo audit` exits non-zero only on `vulnerability`
        # findings; informational warnings (unmaintained, yanked,
        # notice) are surfaced in the log but don't fail CI.
        run: cargo audit

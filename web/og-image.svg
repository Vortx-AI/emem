    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3aff"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="globe" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#1a1f4a"/>

# Cap journal retention at 30 days to match the privacy posture
# declared at https://emem.dev/privacy. This applies to the system
# journal globally; individual services still get the systemd
# default for vacuum-on-disk-pressure, whichever fires first.
#
# Operator: Vortx AI Private Limited (avijeet@vortx.ai)
# Reference: emem Protocol Specification v0.0.4 §13.3
#
# Install:
#   sudo install -m 0644 ops/systemd/journald-30day-retention.conf \
#     /etc/systemd/journald.conf.d/30day-retention.conf
#   sudo systemctl restart systemd-journald
#   sudo journalctl --vacuum-time=30d
[Journal]
MaxRetentionSec=30day
